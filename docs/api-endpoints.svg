<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <filter id="s2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="600" rx="16" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">API Endpoints</text>
  <text x="450" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">RESTful JSON API running on :8080</text>

  <!-- Endpoint 1: GET /users -->
  <rect x="40" y="90" width="820" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <rect x="55" y="105" width="55" height="26" rx="6" fill="#22c55e"/>
  <text x="82" y="123" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GET</text>
  <text x="125" y="123" fill="#e2e8f0" font-size="14" font-weight="600">/users</text>
  <text x="340" y="123" fill="#64748b" font-size="12">List all users with nested address &amp; company data</text>
  <!-- Response preview -->
  <rect x="55" y="140" width="790" height="48" rx="6" fill="#0f172a"/>
  <text x="65" y="158" fill="#64748b" font-size="10">Response 200</text>
  <text x="65" y="178" fill="#6ee7b7" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">[{"id":1, "name":"Leanne Graham", "email":"sincere@april.biz", "address":{"city":"Gwenborough"}, "company":{"name":"Romaguera"}}]</text>

  <!-- Endpoint 2: GET /posts -->
  <rect x="40" y="215" width="820" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <rect x="55" y="230" width="55" height="26" rx="6" fill="#22c55e"/>
  <text x="82" y="248" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GET</text>
  <text x="125" y="248" fill="#e2e8f0" font-size="14" font-weight="600">/posts</text>
  <text x="340" y="248" fill="#64748b" font-size="12">List all posts with userId, title, and body</text>
  <rect x="55" y="265" width="790" height="48" rx="6" fill="#0f172a"/>
  <text x="65" y="283" fill="#64748b" font-size="10">Response 200</text>
  <text x="65" y="303" fill="#6ee7b7" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">[{"userId":1, "id":1, "title":"sunt aut facere repellat provident", "body":"quia et suscipit..."}]</text>

  <!-- Endpoint 3: GET /comments -->
  <rect x="40" y="340" width="820" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <rect x="55" y="355" width="55" height="26" rx="6" fill="#22c55e"/>
  <text x="82" y="373" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GET</text>
  <text x="125" y="373" fill="#e2e8f0" font-size="14" font-weight="600">/comments</text>
  <text x="340" y="373" fill="#64748b" font-size="12">List all comments</text>
  <rect x="55" y="390" width="790" height="48" rx="6" fill="#0f172a"/>
  <text x="65" y="408" fill="#64748b" font-size="10">Response 200</text>
  <text x="65" y="428" fill="#6ee7b7" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">[{"postId":1, "id":1, "name":"id labore ex et quam", "email":"eliseo@gardner.biz", "body":"laudantium enim..."}]</text>

  <!-- Endpoint 4: GET /posts/:postId/comments -->
  <rect x="40" y="465" width="820" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <rect x="55" y="480" width="55" height="26" rx="6" fill="#22c55e"/>
  <text x="82" y="498" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GET</text>
  <text x="125" y="498" fill="#e2e8f0" font-size="14" font-weight="600">/posts/:postId/comments</text>
  <text x="410" y="498" fill="#64748b" font-size="12">Get comments for a specific post (parameterized query)</text>
  <rect x="55" y="515" width="790" height="48" rx="6" fill="#0f172a"/>
  <text x="65" y="533" fill="#64748b" font-size="10">Response 200  |  <tspan fill="#f59e0b">:postId = 1</tspan></text>
  <text x="65" y="553" fill="#6ee7b7" font-size="11" font-family="'SF Mono', 'Fira Code', monospace">[{"postId":1, "id":1, "name":"id labore ex et quam", "email":"eliseo@gardner.biz", "body":"laudantium..."}]</text>
</svg>
