<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <filter id="s4" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="480" rx="16" fill="url(#bg4)"/>

  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Project Structure</text>
  <text x="450" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">Clean separation of concerns</text>

  <!-- File tree -->
  <rect x="40" y="85" width="380" height="370" rx="12" fill="rgba(255,255,255,0.03)" stroke="#334155" stroke-width="1" filter="url(#s4)"/>

  <text x="60" y="115" fill="#f59e0b" font-size="14" font-weight="700" font-family="'SF Mono', 'Fira Code', monospace">go-posts-api/</text>

  <text x="80" y="145" fill="#64748b" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">|</text>
  <text x="100" y="145" fill="#22c55e" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">main.go</text>
  <text x="250" y="145" fill="#475569" font-size="11">Entry point, routes, DB</text>

  <text x="80" y="170" fill="#64748b" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">|</text>
  <text x="100" y="170" fill="#94a3b8" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">go.mod</text>
  <text x="250" y="170" fill="#475569" font-size="11">Dependencies</text>

  <text x="80" y="195" fill="#64748b" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">|</text>
  <text x="100" y="195" fill="#94a3b8" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">.env.example</text>
  <text x="250" y="195" fill="#475569" font-size="11">Env template</text>

  <text x="80" y="225" fill="#64748b" font-size="13" font-family="'SF Mono', 'Fira Code', monospace">|</text>
  <text x="80" y="250" fill="#6366f1" font-size="13" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">+-- services/</text>
  <text x="100" y="275" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">|   users.go</text>
  <text x="100" y="295" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">|   posts.go</text>
  <text x="100" y="315" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">|   comments.go</text>

  <text x="80" y="340" fill="#10b981" font-size="13" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">+-- repo/</text>
  <text x="100" y="360" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">|   users.go  posts.go  comments.go</text>

  <text x="80" y="385" fill="#ef4444" font-size="13" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">+-- data/</text>
  <text x="100" y="405" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">|   users.go  posts.go  comments.go</text>

  <text x="80" y="430" fill="#f59e0b" font-size="13" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">+-- util/</text>
  <text x="100" y="450" fill="#64748b" font-size="12" font-family="'SF Mono', 'Fira Code', monospace">    util.go</text>

  <!-- Layer descriptions -->
  <rect x="460" y="85" width="400" height="90" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="475" y="100" width="12" height="12" rx="3" fill="#6366f1"/>
  <text x="498" y="111" fill="#e2e8f0" font-size="13" font-weight="600">services/</text>
  <text x="580" y="111" fill="#94a3b8" font-size="12">Handler Layer</text>
  <text x="498" y="133" fill="#94a3b8" font-size="11">HTTP request handlers. Receives Gin context,</text>
  <text x="498" y="150" fill="#94a3b8" font-size="11">calls repo, returns JSON responses.</text>

  <rect x="460" y="190" width="400" height="90" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="475" y="205" width="12" height="12" rx="3" fill="#10b981"/>
  <text x="498" y="216" fill="#e2e8f0" font-size="13" font-weight="600">repo/</text>
  <text x="548" y="216" fill="#94a3b8" font-size="12">Data Access Layer</text>
  <text x="498" y="238" fill="#94a3b8" font-size="11">SQL queries against PostgreSQL.</text>
  <text x="498" y="255" fill="#94a3b8" font-size="11">Scans rows into Go structs.</text>

  <rect x="460" y="295" width="400" height="90" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="475" y="310" width="12" height="12" rx="3" fill="#ef4444"/>
  <text x="498" y="321" fill="#e2e8f0" font-size="13" font-weight="600">data/</text>
  <text x="548" y="321" fill="#94a3b8" font-size="12">Models &amp; Seed Data</text>
  <text x="498" y="343" fill="#94a3b8" font-size="11">Go struct definitions with JSON tags.</text>
  <text x="498" y="360" fill="#94a3b8" font-size="11">Sample data for seeding the database.</text>

  <rect x="460" y="400" width="400" height="60" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="475" y="415" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="498" y="426" fill="#e2e8f0" font-size="13" font-weight="600">util/</text>
  <text x="548" y="426" fill="#94a3b8" font-size="12">Utilities</text>
  <text x="498" y="448" fill="#94a3b8" font-size="11">Helper functions (JSON formatting, reflection).</text>
</svg>
