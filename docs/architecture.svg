<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#4f46e5" />
    </linearGradient>
    <linearGradient id="ginGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#0891b2" />
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
    <linearGradient id="repoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444" />
      <stop offset="100%" style="stop-color:#dc2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">go-posts-api Architecture</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">3-Layer Clean Architecture with Gin + PostgreSQL</text>

  <!-- Client Box -->
  <rect x="50" y="100" width="150" height="80" rx="12" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="125" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">HTTP Client</text>
  <text x="125" y="155" text-anchor="middle" fill="#c7d2fe" font-size="11">REST Requests</text>

  <!-- Arrow Client -> Router -->
  <line x1="200" y1="140" x2="265" y2="140" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="265,135 275,140 265,145" fill="#6366f1"/>
  <text x="237" y="132" text-anchor="middle" fill="#94a3b8" font-size="10">JSON</text>

  <!-- Gin Router / CORS Box -->
  <rect x="280" y="90" width="180" height="100" rx="12" fill="url(#ginGrad)" filter="url(#shadow)"/>
  <text x="370" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Gin Router</text>
  <text x="370" y="140" text-anchor="middle" fill="#cffafe" font-size="11">CORS Middleware</text>
  <text x="370" y="158" text-anchor="middle" fill="#cffafe" font-size="10">:8080</text>
  <rect x="295" y="166" width="150" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="370" y="179" text-anchor="middle" fill="#ecfeff" font-size="9">GET /users /posts /comments</text>

  <!-- Arrow Router -> Services -->
  <line x1="370" y1="190" x2="370" y2="235" stroke="#06b6d4" stroke-width="2.5"/>
  <polygon points="365,235 370,245 375,235" fill="#06b6d4"/>

  <!-- Services Layer -->
  <rect x="180" y="250" width="380" height="90" rx="12" fill="url(#serviceGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="370" y="275" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Services Layer</text>
  <text x="370" y="295" text-anchor="middle" fill="#d1fae5" font-size="11">Business Logic &amp; Error Handling</text>
  <rect x="200" y="305" width="100" height="22" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="250" y="320" text-anchor="middle" fill="#fff" font-size="10">GetUsers()</text>
  <rect x="310" y="305" width="100" height="22" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="360" y="320" text-anchor="middle" fill="#fff" font-size="10">GetPosts()</text>
  <rect x="420" y="305" width="120" height="22" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="480" y="320" text-anchor="middle" fill="#fff" font-size="10">GetComments()</text>

  <!-- Arrow Services -> Repo -->
  <line x1="370" y1="340" x2="370" y2="375" stroke="#10b981" stroke-width="2.5"/>
  <polygon points="365,375 370,385 375,375" fill="#10b981"/>

  <!-- Repository Layer -->
  <rect x="180" y="390" width="380" height="55" rx="12" fill="url(#repoGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="370" y="415" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Repository Layer</text>
  <text x="370" y="433" text-anchor="middle" fill="#fef3c7" font-size="11">SQL Queries &amp; Data Access</text>

  <!-- Arrow Repo -> DB -->
  <line x1="560" y1="417" x2="620" y2="417" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="620,412 630,417 620,422" fill="#f59e0b"/>

  <!-- PostgreSQL -->
  <rect x="640" y="380" width="200" height="75" rx="12" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <text x="740" y="410" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">PostgreSQL</text>
  <text x="740" y="430" text-anchor="middle" fill="#fecaca" font-size="11">users | posts | comments</text>
  <text x="740" y="447" text-anchor="middle" fill="#fecaca" font-size="10">lib/pq driver</text>

  <!-- Side labels -->
  <rect x="680" y="100" width="170" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="#334155" stroke-width="1"/>
  <text x="765" y="125" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Tech Stack</text>
  <text x="765" y="148" text-anchor="middle" fill="#6366f1" font-size="11">Go 1.21+</text>
  <text x="765" y="167" text-anchor="middle" fill="#06b6d4" font-size="11">Gin Framework</text>
  <text x="765" y="186" text-anchor="middle" fill="#10b981" font-size="11">gin-contrib/cors</text>
  <text x="765" y="205" text-anchor="middle" fill="#ef4444" font-size="11">PostgreSQL + lib/pq</text>

  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" fill="#475569" font-size="11">go-posts-api | Clean Architecture Pattern</text>
</svg>
